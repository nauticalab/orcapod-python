[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v
markers =
    postgres: mark test as requiring a live PostgreSQL instance
    integration: mark test as an integration test (may be slower)
    minio: tests requiring a running MinIO instance (via testcontainers or MINIO_ENDPOINT env var)
